<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwarmIA - Change Password</title>
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-dark: #4338ca;
            --secondary-color: #10b981;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }
        
        /* Background animated particles */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }
        
        .particle {
            position: absolute;
            background: rgba(79, 70, 229, 0.3);
            border-radius: 50%;
            animation: float linear infinite;
        }
        
        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }
        
        .container {
            width: 100%;
            max-width: 480px;
            position: relative;
            z-index: 1;
        }
        
        .card {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--warning-color), var(--primary-color));
        }
        
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .header h1 {
            font-size: 2rem;
            background: linear-gradient(90deg, var(--warning-color), var(--primary-color));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 800;
        }
        
        .header p {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 8px;
        }
        
        .badge {
            display: inline-block;
            background: rgba(245, 158, 11, 0.2);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: var(--warning-color);
            margin-top: 12px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.85rem;
        }
        
        .input-wrapper {
            position: relative;
        }
        
        .input-wrapper i.input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1rem;
            z-index: 1;
        }
        
        .input-wrapper input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        
        .input-wrapper input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }
        
        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1rem;
            padding: 0;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
            z-index: 1;
        }
        
        .password-toggle:hover {
            color: var(--text-primary);
        }
        
        .password-strength {
            margin-top: 8px;
            display: flex;
            gap: 4px;
        }
        
        .strength-bar {
            flex: 1;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            transition: all 0.3s;
        }
        
        .strength-bar.weak { background: var(--danger-color); }
        .strength-bar.medium { background: var(--warning-color); }
        .strength-bar.strong { background: var(--success-color); }
        
        .strength-text {
            font-size: 0.7rem;
            margin-top: 6px;
            color: var(--text-secondary);
        }
        
        .btn-change {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, var(--primary-color), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
        }
        
        .btn-change:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.4);
        }
        
        .btn-change:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--text-secondary);
        }
        
        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.85rem;
            animation: slideDown 0.3s ease;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .alert-warning {
            background: rgba(245, 158, 11, 0.15);
            border: 1px solid var(--warning-color);
            color: #fbbf24;
        }
        
        .alert-danger {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid var(--danger-color);
            color: #f87171;
        }
        
        .alert-success {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid var(--success-color);
            color: #34d399;
        }
        
        .alert i {
            margin-right: 8px;
        }
        
        .requirements {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 12px;
            padding: 12px 16px;
            margin-top: 16px;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        
        .requirements ul {
            list-style: none;
            margin-top: 8px;
        }
        
        .requirements li {
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .requirements li i {
            width: 16px;
            font-size: 0.7rem;
        }
        
        .requirements li.valid {
            color: var(--success-color);
        }
        
        .requirements li.invalid {
            color: var(--text-secondary);
        }
        
        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }
            
            .header h1 {
                font-size: 1.5rem;
            }
        }
        
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="bg-particles" id="particles"></div>
    
    <div class="container">
        <div class="card">
            <div class="header">
                <h1><i class="fas fa-key"></i> Change Password</h1>
                <p>First login required • Set a secure password</p>
                <span class="badge"><i class="fas fa-exclamation-triangle"></i> Required Action</span>
            </div>
            
            <div id="alertError" class="alert alert-danger" style="display: none;">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorMessage"></span>
            </div>
            
            <div id="alertSuccess" class="alert alert-success" style="display: none;">
                <i class="fas fa-check-circle"></i>
                <span id="successMessage"></span>
            </div>
            
            <div id="alertWarning" class="alert alert-warning" style="display: none;">
                <i class="fas fa-shield-alt"></i>
                <span id="warningMessage"></span>
            </div>
            
            <form id="changePasswordForm">
                <div class="form-group">
                    <label for="currentPassword">Current Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="currentPassword" name="currentPassword" placeholder="Enter current password" autocomplete="current-password" required>
                        <button type="button" class="password-toggle" data-target="currentPassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-key input-icon"></i>
                        <input type="password" id="newPassword" name="newPassword" placeholder="Enter new password" autocomplete="new-password" required>
                        <button type="button" class="password-toggle" data-target="newPassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength" id="strengthBars">
                        <div class="strength-bar"></div>
                        <div class="strength-bar"></div>
                        <div class="strength-bar"></div>
                        <div class="strength-bar"></div>
                    </div>
                    <div class="strength-text" id="strengthText"></div>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Confirm New Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-check-circle input-icon"></i>
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm new password" autocomplete="off" required>
                        <button type="button" class="password-toggle" data-target="confirmPassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div id="matchIndicator" style="font-size: 0.7rem; margin-top: 6px;"></div>
                </div>
                
                <div class="requirements">
                    <i class="fas fa-shield-alt"></i> Password Requirements:
                    <ul>
                        <li id="req-length"><i class="fas fa-circle"></i> At least 8 characters</li>
                        <li id="req-upper"><i class="fas fa-circle"></i> At least one uppercase letter</li>
                        <li id="req-lower"><i class="fas fa-circle"></i> At least one lowercase letter</li>
                        <li id="req-number"><i class="fas fa-circle"></i> At least one number</li>
                        <li id="req-special"><i class="fas fa-circle"></i> At least one special character</li>
                    </ul>
                </div>
                
                <button type="submit" class="btn-change" id="changeBtn" disabled>
                    <i class="fas fa-sync-alt"></i> Change Password & Continue
                </button>
                
                <button type="button" class="btn-secondary" onclick="window.location.href='/login'">
                    <i class="fas fa-arrow-left"></i> Back to Login
                </button>
            </form>
        </div>
    </div>
    
    <script>
        // Generate background particles
        function createParticles() {
            const container = document.getElementById('particles');
            if (!container) return;
            
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 4 + 2;
                const left = Math.random() * 100;
                const duration = Math.random() * 20 + 10;
                const delay = Math.random() * 20;
                
                particle.style.cssText = `
                    width: ${size}px;
                    height: ${size}px;
                    left: ${left}%;
                    animation-duration: ${duration}s;
                    animation-delay: -${delay}s;
                    background: rgba(79, 70, 229, ${Math.random() * 0.3 + 0.1});
                `;
                container.appendChild(particle);
            }
        }
        
        // Password strength checker
        function checkPasswordStrength(password) {
            let strength = 0;
            const checks = {
                length: password.length >= 8,
                upper: /[A-Z]/.test(password),
                lower: /[a-z]/.test(password),
                number: /[0-9]/.test(password),
                special: /[^A-Za-z0-9]/.test(password)
            };
            
            strength = Object.values(checks).filter(Boolean).length;
            
            // Update requirement indicators
            document.getElementById('req-length').className = checks.length ? 'valid' : 'invalid';
            document.getElementById('req-upper').className = checks.upper ? 'valid' : 'invalid';
            document.getElementById('req-lower').className = checks.lower ? 'valid' : 'invalid';
            document.getElementById('req-number').className = checks.number ? 'valid' : 'invalid';
            document.getElementById('req-special').className = checks.special ? 'valid' : 'invalid';
            
            document.querySelectorAll('#req-length i, #req-upper i, #req-lower i, #req-number i, #req-special i').forEach(icon => {
                icon.className = icon.parentElement.classList.contains('valid') ? 'fas fa-check-circle' : 'fas fa-circle';
            });
            
            // Update strength bars
            const bars = document.querySelectorAll('.strength-bar');
            bars.forEach((bar, index) => {
                bar.className = 'strength-bar';
                if (index < strength) {
                    if (strength <= 2) bar.classList.add('weak');
                    else if (strength <= 3) bar.classList.add('medium');
                    else bar.classList.add('strong');
                }
            });
            
            // Update strength text
            const strengthText = document.getElementById('strengthText');
            if (password.length === 0) {
                strengthText.textContent = '';
            } else if (strength <= 2) {
                strengthText.textContent = 'Weak password';
                strengthText.style.color = 'var(--danger-color)';
            } else if (strength <= 3) {
                strengthText.textContent = 'Medium password';
                strengthText.style.color = 'var(--warning-color)';
            } else {
                strengthText.textContent = 'Strong password';
                strengthText.style.color = 'var(--success-color)';
            }
            
            return { strength, checks };
        }
        
        // Check password match
        function checkPasswordMatch() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const matchIndicator = document.getElementById('matchIndicator');
            
            if (confirmPassword.length === 0) {
                matchIndicator.innerHTML = '';
                return false;
            }
            
            if (newPassword === confirmPassword) {
                matchIndicator.innerHTML = '<i class="fas fa-check-circle" style="color: var(--success-color);"></i> Passwords match';
                matchIndicator.style.color = 'var(--success-color)';
                return true;
            } else {
                matchIndicator.innerHTML = '<i class="fas fa-exclamation-circle" style="color: var(--danger-color);"></i> Passwords do not match';
                matchIndicator.style.color = 'var(--danger-color)';
                return false;
            }
        }
        
        // Update change button state
        function updateChangeButton() {
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const strength = checkPasswordStrength(newPassword);
            const match = checkPasswordMatch();
            
            const isValid = currentPassword.length > 0 && 
                           strength.strength >= 4 && 
                           match && 
                           newPassword === confirmPassword;
            
            const changeBtn = document.getElementById('changeBtn');
            changeBtn.disabled = !isValid;
            
            return isValid;
        }
        
        // Handle form submission
        document.getElementById('changePasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Hide all alerts
            document.getElementById('alertError').style.display = 'none';
            document.getElementById('alertSuccess').style.display = 'none';
            document.getElementById('alertWarning').style.display = 'none';
            
            // Validation
            if (newPassword !== confirmPassword) {
                document.getElementById('errorMessage').textContent = 'New passwords do not match';
                document.getElementById('alertError').style.display = 'block';
                return;
            }
            
            if (newPassword.length < 8) {
                document.getElementById('errorMessage').textContent = 'Password must be at least 8 characters';
                document.getElementById('alertError').style.display = 'block';
                return;
            }
            
            const strength = checkPasswordStrength(newPassword);
            if (strength.strength < 4) {
                document.getElementById('warningMessage').textContent = 'Please use a stronger password that meets all requirements';
                document.getElementById('alertWarning').style.display = 'block';
                return;
            }
            
            // Disable button and show loading
            const changeBtn = document.getElementById('changeBtn');
            changeBtn.innerHTML = '<span class="spinner"></span> Changing Password...';
            changeBtn.disabled = true;
            
            try {
                const response = await fetch('/api/change-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        current_password: currentPassword,
                        new_password: newPassword,
                        confirm_password: confirmPassword
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    
                    // Show success message
                    document.getElementById('successMessage').textContent = data.message || 'Password changed successfully!';
                    document.getElementById('alertSuccess').style.display = 'block';
                    
                    // Clear sensitive data from form
                    document.getElementById('changePasswordForm').reset();
                    document.getElementById('strengthText').textContent = '';
                    document.getElementById('matchIndicator').innerHTML = '';
                    
                    // Update button state
                    changeBtn.innerHTML = '<i class="fas fa-check"></i> Password Changed! Redirecting...';
                    changeBtn.style.background = 'linear-gradient(90deg, #10b981, #059669)';
                    
                    // Clear localStorage and redirect to login after 2 seconds
                    localStorage.removeItem('swarmia_username');
                    localStorage.removeItem('swarmia_login_time');
                    
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                    
                } else {
                    let errorMessage = 'Failed to change password';
                    try {
                        const error = await response.json();
                        errorMessage = error.detail || error.message || errorMessage;
                    } catch (e) {}
                    throw new Error(errorMessage);
                }
                
            } catch (error) {
                console.error('Password change error:', error);
                document.getElementById('errorMessage').textContent = error.message;
                document.getElementById('alertError').style.display = 'block';
                
                // Re-enable button
                changeBtn.innerHTML = '<i class="fas fa-sync-alt"></i> Change Password & Continue';
                changeBtn.disabled = false;
            }
        });
        
        // Real-time validation
        document.getElementById('currentPassword').addEventListener('input', updateChangeButton);
        document.getElementById('newPassword').addEventListener('input', () => {
            checkPasswordStrength(document.getElementById('newPassword').value);
            checkPasswordMatch();
            updateChangeButton();
        });
        document.getElementById('confirmPassword').addEventListener('input', () => {
            checkPasswordMatch();
            updateChangeButton();
        });
        
        // Password visibility toggle
        document.querySelectorAll('.password-toggle').forEach(button => {
            button.addEventListener('click', function() {
                const targetId = this.getAttribute('data-target');
                const input = document.getElementById(targetId);
                if (input) {
                    const type = input.type === 'password' ? 'text' : 'password';
                    input.type = type;
                    this.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
                }
            });
        });
        
        // Initialize
        createParticles();
        
        // Auto-focus current password field
        document.getElementById('currentPassword').focus();
        
        // Show warning about password change requirement
        setTimeout(() => {
            document.getElementById('warningMessage').innerHTML = 'This is your first login. Please set a secure password to continue.';
            document.getElementById('alertWarning').style.display = 'block';
        }, 500);
    </script>
</body>
</html>
