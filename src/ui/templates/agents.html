<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwarmIA - Agentes</title>
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --offline: #64748b;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
        }
        
        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo i {
            font-size: 28px;
            color: var(--primary);
        }
        
        .logo h1 {
            font-size: 20px;
            font-weight: 600;
        }
        
        .logo span {
            font-size: 12px;
            color: var(--text-secondary);
            margin-left: 8px;
        }
        
        .back-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .back-link:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }
        
        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }
        
        /* Page Header */
        .page-header {
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .page-header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--primary), var(--info));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .page-header p {
            color: var(--text-secondary);
            margin-top: 4px;
            font-size: 14px;
        }
        
        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            transition: all 0.2s;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
        }
        
        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        
        /* Agent Cards Grid */
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        
        .agent-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s;
        }
        
        .agent-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border-color: var(--primary);
        }
        
        .agent-card.online {
            border-left: 4px solid var(--success);
        }
        
        .agent-card.offline {
            border-left: 4px solid var(--offline);
            opacity: 0.7;
        }
        
        .agent-card.busy {
            border-left: 4px solid var(--warning);
        }
        
        .agent-header {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid var(--border);
        }
        
        .agent-icon {
            width: 48px;
            height: 48px;
            background: rgba(79, 70, 229, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .agent-info {
            flex: 1;
        }
        
        .agent-name {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .agent-type {
            font-size: 11px;
            background: rgba(79, 70, 229, 0.2);
            color: var(--primary);
            padding: 2px 8px;
            border-radius: 20px;
        }
        
        .agent-status {
            font-size: 12px;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        
        .status-dot.online { background: var(--success); box-shadow: 0 0 5px var(--success); }
        .status-dot.busy { background: var(--warning); box-shadow: 0 0 5px var(--warning); }
        .status-dot.offline { background: var(--offline); }
        
        .agent-body {
            padding: 16px 20px;
        }
        
        .agent-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .agent-stat {
            background: var(--bg-primary);
            padding: 8px 12px;
            border-radius: 8px;
            text-align: center;
        }
        
        .agent-stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
        }
        
        .agent-stat-label {
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        
        .agent-capabilities {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 16px;
        }
        
        .capability-tag {
            background: rgba(79, 70, 229, 0.15);
            color: var(--text-secondary);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 10px;
        }
        
        .agent-footer {
            padding: 12px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        
        .agent-action {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .agent-action:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }
        
        .agent-action.restart:hover { color: var(--warning); }
        .agent-action.stop:hover { color: var(--error); }
        
        /* Filters */
        .filters-bar {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
            justify-content: space-between;
        }
        
        .filters-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .filter-select {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
        }
        
        .btn-icon {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-icon:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .btn-primary {
            background: linear-gradient(90deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            border: 1px solid var(--border);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-header h3 {
            font-size: 18px;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
        }
        
        .modal-body {
            margin-bottom: 24px;
        }
        
        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        
        /* Alerts */
        .alert {
            position: fixed;
            top: 80px;
            right: 24px;
            padding: 12px 20px;
            border-radius: 10px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            max-width: 400px;
        }
        
        .alert-success {
            background: rgba(16, 185, 129, 0.9);
            color: white;
        }
        
        .alert-error {
            background: rgba(239, 68, 68, 0.9);
            color: white;
        }
        
        .alert-warning {
            background: rgba(245, 158, 11, 0.9);
            color: white;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        /* Loading */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-secondary);
        }
        
        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        @media (max-width: 768px) {
            .container { padding: 16px; }
            .agents-grid { grid-template-columns: 1fr; }
            .filters-bar { flex-direction: column; align-items: stretch; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
        
        .refresh-indicator {
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .last-heartbeat {
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <i class="fas fa-robot"></i>
            <h1>SwarmIA <span>v2.0</span></h1>
        </div>
        <a href="/" class="back-link">
            <i class="fas fa-arrow-left"></i>
            Volver al Dashboard
        </a>
    </div>
    
    <div class="container">
        <div class="page-header">
            <div>
                <h1><i class="fas fa-microchip"></i> Agentes</h1>
                <p>Monitoreo y gestión de agentes del sistema</p>
            </div>
            <button class="btn-icon" onclick="refreshAgents()" id="refreshBtn">
                <i class="fas fa-sync-alt"></i> Actualizar
            </button>
        </div>
        
        <!-- Tarjetas de Estadísticas -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalAgents">0</div>
                <div class="stat-label">Total Agentes</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="onlineAgents">0</div>
                <div class="stat-label">En Línea</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="busyAgents">0</div>
                <div class="stat-label">Ocupados</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="offlineAgents">0</div>
                <div class="stat-label">Desconectados</div>
            </div>
        </div>
        
        <!-- Filtros -->
        <div class="filters-bar">
            <div class="filters-group">
                <select id="statusFilter" class="filter-select" onchange="filterAgents()">
                    <option value="all">Todos los estados</option>
                    <option value="online">En línea</option>
                    <option value="busy">Ocupados</option>
                    <option value="offline">Desconectados</option>
                </select>
                
                <select id="typeFilter" class="filter-select" onchange="filterAgents()">
                    <option value="all">Todos los tipos</option>
                    <option value="chat">Chat</option>
                    <option value="aggressive">Agresivo</option>
                    <option value="supervisor">Supervisor</option>
                    <option value="gateway">Gateway</option>
                </select>
            </div>
            
            <button class="btn-icon" onclick="clearFilters()">
                <i class="fas fa-times"></i> Limpiar filtros
            </button>
        </div>
        
        <!-- Grid de Agentes -->
        <div id="agentsGrid" class="agents-grid">
            <div class="empty-state">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Cargando agentes...</p>
            </div>
        </div>
    </div>
    
    <!-- Modal de Detalles -->
    <div id="agentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-info-circle"></i> Detalles del Agente</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="agentModalBody">
                Cargando...
            </div>
            <div class="modal-actions">
                <button class="btn-icon" onclick="closeModal()">Cerrar</button>
            </div>
        </div>
    </div>
    
    <div id="alertContainer"></div>
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
    </div>
    
    <script>
        let allAgents = [];
        let filteredAgents = [];
        
        // Cargar agentes desde la API
        async function loadAgents() {
            showLoading(true);
            try {
                const response = await fetch('/api/agents/status');
                if (response.ok) {
                    const data = await response.json();
                    allAgents = data.agents || [];
                    applyFilters();
                    updateStats();
                } else {
                    // Datos de ejemplo si la API no está disponible
                    allAgents = getMockAgents();
                    applyFilters();
                    updateStats();
                }
            } catch (error) {
                console.error('Error cargando agentes:', error);
                allAgents = getMockAgents();
                applyFilters();
                updateStats();
                showAlert('Usando datos de ejemplo - API no disponible', 'warning');
            } finally {
                showLoading(false);
            }
        }
        
        // Datos de ejemplo para desarrollo
        function getMockAgents() {
            return [
                {
                    id: "agent_chat_001",
                    name: "Asistente de Chat",
                    type: "chat",
                    status: "online",
                    tasks_completed: 1247,
                    current_tasks: 2,
                    uptime: "3d 12h",
                    capabilities: ["procesar_mensajes", "analizar_sentimiento", "responder_preguntas"],
                    last_heartbeat: new Date().toISOString()
                },
                {
                    id: "agent_agg_001",
                    name: "Agente Agresivo",
                    type: "aggressive",
                    status: "busy",
                    tasks_completed: 892,
                    current_tasks: 3,
                    uptime: "2d 8h",
                    capabilities: ["ejecutar_acciones", "monitorear_sistema", "alertas"],
                    last_heartbeat: new Date().toISOString()
                },
                {
                    id: "agent_sup_001",
                    name: "Supervisor Principal",
                    type: "supervisor",
                    status: "online",
                    tasks_completed: 3421,
                    current_tasks: 1,
                    uptime: "7d 2h",
                    capabilities: ["asignar_tareas", "gestionar_colas", "balancear_carga"],
                    last_heartbeat: new Date().toISOString()
                },
                {
                    id: "agent_gateway_001",
                    name: "Gateway de Comunicación",
                    type: "gateway",
                    status: "offline",
                    tasks_completed: 0,
                    current_tasks: 0,
                    uptime: "0h",
                    capabilities: ["whatsapp", "telegram", "webhook"],
                    last_heartbeat: new Date(Date.now() - 7200000).toISOString()
                }
            ];
        }
        
        // Actualizar estadísticas
        function updateStats() {
            const stats = {
                total: allAgents.length,
                online: allAgents.filter(a => a.status === 'online').length,
                busy: allAgents.filter(a => a.status === 'busy').length,
                offline: allAgents.filter(a => a.status === 'offline').length
            };
            
            document.getElementById('totalAgents').textContent = stats.total;
            document.getElementById('onlineAgents').textContent = stats.online;
            document.getElementById('busyAgents').textContent = stats.busy;
            document.getElementById('offlineAgents').textContent = stats.offline;
        }
        
        // Aplicar filtros
        function applyFilters() {
            const status = document.getElementById('statusFilter').value;
            const type = document.getElementById('typeFilter').value;
            
            filteredAgents = allAgents.filter(agent => {
                if (status !== 'all' && agent.status !== status) return false;
                if (type !== 'all' && agent.type !== type) return false;
                return true;
            });
            
            renderAgents();
        }
        
        // Renderizar tarjetas de agentes
        function renderAgents() {
            const grid = document.getElementById('agentsGrid');
            
            if (filteredAgents.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-robot"></i>
                        <p>No se encontraron agentes</p>
                        <small>Intenta con otros filtros</small>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = filteredAgents.map(agent => `
                <div class="agent-card ${agent.status}">
                    <div class="agent-header">
                        <div class="agent-icon">
                            ${getAgentIcon(agent.type)}
                        </div>
                        <div class="agent-info">
                            <div class="agent-name">
                                ${agent.name}
                                <span class="agent-type">${getAgentTypeName(agent.type)}</span>
                            </div>
                            <div class="agent-status">
                                <span class="status-dot ${agent.status}"></span>
                                ${getStatusText(agent.status)}
                                ${agent.current_tasks > 0 ? ` • ${agent.current_tasks} tareas activas` : ''}
                            </div>
                            <div class="last-heartbeat">
                                <i class="fas fa-heartbeat"></i> Último latido: ${formatHeartbeat(agent.last_heartbeat)}
                            </div>
                        </div>
                    </div>
                    <div class="agent-body">
                        <div class="agent-stats">
                            <div class="agent-stat">
                                <div class="agent-stat-value">${agent.tasks_completed || 0}</div>
                                <div class="agent-stat-label">Tareas completadas</div>
                            </div>
                            <div class="agent-stat">
                                <div class="agent-stat-value">${agent.uptime || 'N/A'}</div>
                                <div class="agent-stat-label">Tiempo activo</div>
                            </div>
                        </div>
                        <div class="agent-capabilities">
                            ${agent.capabilities?.map(cap => `<span class="capability-tag"><i class="fas fa-bolt"></i> ${cap}</span>`).join('') || '<span class="capability-tag">Sin capacidades definidas</span>'}
                        </div>
                    </div>
                    <div class="agent-footer">
                        <button class="agent-action" onclick="viewAgentDetails('${agent.id}')">
                            <i class="fas fa-eye"></i> Detalles
                        </button>
                        ${agent.status !== 'offline' ? `
                            <button class="agent-action restart" onclick="restartAgent('${agent.id}')">
                                <i class="fas fa-sync-alt"></i> Reiniciar
                            </button>
                        ` : ''}
                        ${agent.status === 'busy' ? `
                            <button class="agent-action stop" onclick="stopAgentTasks('${agent.id}')">
                                <i class="fas fa-stop"></i> Detener tareas
                            </button>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }
        
        // Obtener icono según tipo de agente
        function getAgentIcon(type) {
            const icons = {
                chat: '<i class="fas fa-comment-dots"></i>',
                aggressive: '<i class="fas fa-bolt"></i>',
                supervisor: '<i class="fas fa-chart-line"></i>',
                gateway: '<i class="fas fa-network-wired"></i>'
            };
            return icons[type] || '<i class="fas fa-microchip"></i>';
        }
        
        // Obtener nombre legible del tipo
        function getAgentTypeName(type) {
            const names = {
                chat: 'Chat',
                aggressive: 'Agresivo',
                supervisor: 'Supervisor',
                gateway: 'Gateway'
            };
            return names[type] || type;
        }
        
        // Obtener texto de estado en español
        function getStatusText(status) {
            const texts = {
                online: '<span style="color: var(--success);">🟢 En línea</span>',
                busy: '<span style="color: var(--warning);">🟡 Ocupado</span>',
                offline: '<span style="color: var(--offline);">⚫ Desconectado</span>'
            };
            return texts[status] || status;
        }
        
        // Formatear fecha de último latido
        function formatHeartbeat(dateStr) {
            if (!dateStr) return 'Nunca';
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return 'hace unos segundos';
            if (diff < 3600000) return `hace ${Math.floor(diff / 60000)} minutos`;
            if (diff < 86400000) return `hace ${Math.floor(diff / 3600000)} horas`;
            return date.toLocaleDateString();
        }
        
        // Filtrar agentes
        function filterAgents() {
            applyFilters();
        }
        
        function clearFilters() {
            document.getElementById('statusFilter').value = 'all';
            document.getElementById('typeFilter').value = 'all';
            applyFilters();
        }
        
        // Actualizar agentes
        async function refreshAgents() {
            const btn = document.getElementById('refreshBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Actualizando...';
            btn.disabled = true;
            
            await loadAgents();
            
            setTimeout(() => {
                btn.innerHTML = '<i class="fas fa-sync-alt"></i> Actualizar';
                btn.disabled = false;
            }, 500);
        }
        
        // Ver detalles del agente
        async function viewAgentDetails(agentId) {
            showLoading(true);
            try {
                const agent = allAgents.find(a => a.id === agentId);
                if (agent) {
                    const modalBody = document.getElementById('agentModalBody');
                    modalBody.innerHTML = `
                        <div style="margin-bottom: 16px;">
                            <strong>ID:</strong> <code>${agent.id}</code>
                        </div>
                        <div style="margin-bottom: 16px;">
                            <strong>Nombre:</strong> ${agent.name}
                        </div>
                        <div style="margin-bottom: 16px;">
                            <strong>Tipo:</strong> ${getAgentTypeName(agent.type)}
                        </div>
                        <div style="margin-bottom: 16px;">
                            <strong>Estado:</strong> ${getStatusText(agent.status)}
                        </div>
                        <div style="margin-bottom: 16px;">
                            <strong>Tareas completadas:</strong> ${agent.tasks_completed || 0}
                        </div>
                        <div style="margin-bottom: 16px;">
                            <strong>Tareas actuales:</strong> ${agent.current_tasks || 0}
                        </div>
                        <div style="margin-bottom: 16px;">
                            <strong>Tiempo activo:</strong> ${agent.uptime || 'N/A'}
                        </div>
                        <div style="margin-bottom: 16px;">
                            <strong>Último latido:</strong> ${formatHeartbeat(agent.last_heartbeat)}
                        </div>
                        <div style="margin-bottom: 16px;">
                            <strong>Capacidades:</strong>
                            <div style="display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;">
                                ${agent.capabilities?.map(cap => `<span class="capability-tag"><i class="fas fa-bolt"></i> ${cap}</span>`).join('') || 'Sin capacidades definidas'}
                            </div>
                        </div>
                        ${agent.metadata ? `
                            <div style="margin-bottom: 16px;">
                                <strong>Metadata:</strong>
                                <pre style="background: var(--bg-primary); padding: 8px; border-radius: 6px; margin-top: 4px; font-size: 11px;">${JSON.stringify(agent.metadata, null, 2)}</pre>
                            </div>
                        ` : ''}
                    `;
                    document.getElementById('agentModal').style.display = 'flex';
                } else {
                    throw new Error('Agente no encontrado');
                }
            } catch (error) {
                showAlert('Error cargando detalles del agente', 'error');
            } finally {
                showLoading(false);
            }
        }
        
        // Reiniciar agente
        async function restartAgent(agentId) {
            if (!confirm('¿Estás seguro de que quieres reiniciar este agente?\n\nLas tareas en curso podrían verse afectadas.')) return;
            
            showLoading(true);
            try {
                const response = await fetch(`/api/agents/${agentId}/restart`, { method: 'POST' });
                if (response.ok) {
                    showAlert(`Agente ${agentId} reiniciado correctamente`, 'success');
                    await loadAgents();
                } else {
                    throw new Error('Error al reiniciar');
                }
            } catch (error) {
                showAlert('Error reiniciando el agente', 'error');
            } finally {
                showLoading(false);
            }
        }
        
        // Detener tareas del agente
        async function stopAgentTasks(agentId) {
            if (!confirm('¿Detener todas las tareas de este agente?\n\nLas tareas en curso serán canceladas.')) return;
            
            showLoading(true);
            try {
                const response = await fetch(`/api/agents/${agentId}/stop-tasks`, { method: 'POST' });
                if (response.ok) {
                    showAlert('Tareas detenidas correctamente', 'success');
                    await loadAgents();
                } else {
                    throw new Error('Error al detener tareas');
                }
            } catch (error) {
                showAlert('Error deteniendo las tareas', 'error');
            } finally {
                showLoading(false);
            }
        }
        
        // Mostrar alerta
        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : type === 'warning' ? 'exclamation-triangle' : 'exclamation-circle'}"></i> ${message}`;
            container.appendChild(alert);
            setTimeout(() => alert.remove(), 3000);
        }
        
        // Mostrar/ocultar loading
        function showLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }
        
        function closeModal() {
            document.getElementById('agentModal').style.display = 'none';
        }
        
        // Auto-refresh cada 10 segundos
        let autoRefreshInterval;
        
        function startAutoRefresh() {
            autoRefreshInterval = setInterval(() => {
                loadAgents();
            }, 10000);
        }
        
        function stopAutoRefresh() {
            if (autoRefreshInterval) clearInterval(autoRefreshInterval);
        }
        
        // Inicializar
        loadAgents();
        startAutoRefresh();
        
        // Limpiar al salir
        window.addEventListener('beforeunload', stopAutoRefresh);
        
        // Cerrar modal con ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
        
        // Cerrar modal al hacer clic fuera
        document.getElementById('agentModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('agentModal')) closeModal();
        });
    </script>
</body>
</html>
