# ============================================================
# SwarmIA Configuration Example
# ============================================================
# Copia este archivo a config/config.yaml y edita con tus valores
# No subas config/config.yaml a Git por seguridad!

# Server
SERVER_HOST: "0.0.0.0"
SERVER_PORT: 8080
SERVER_WORKERS: 1
SERVER_DEBUG: false

# AI
AI_DEFAULT_PROVIDER: "deepseek"
AI_MAX_TOKENS: 4096
AI_TEMPERATURE: 0.7

# DeepSeek
DEEPSEEK_API_KEY: ""
DEEPSEEK_MODEL: "deepseek-chat"

# Llama
LLAMA_MODEL_PATH: ""
LLAMA_CONTEXT_SIZE: 4096
LLAMA_THREADS: 4

# WhatsApp
WHATSAPP_ENABLED: false
WHATSAPP_SESSION_FILE: "whatsapp_session.json"

# Telegram
TELEGRAM_ENABLED: false
TELEGRAM_BOT_TOKEN: ""

# Redis
REDIS_ENABLED: false
REDIS_HOST: "localhost"
REDIS_PORT: 6379
REDIS_DB: 0

# JWT
JWT_ALGORITHM: "HS256"
JWT_EXPIRE_MINUTES: 1440

# ============================================================
# AGGRESSIVE AGENT - PENTESTING TOOLS
# ⚠️ SOLO PARA PRUEBAS AUTORIZADAS ⚠️
# ============================================================
aggressive:
  # Habilitar agente agresivo (false por defecto por seguridad)
  enabled: false
  
  # Modo: normal, aggressive, ultra, stealth
  mode: "normal"
  
  # Intensidad: light, normal, aggressive, ultra, stealth
  intensity: "normal"
  
  # Límites
  max_threads: 50
  timeout: 5
  
  # Modo sigiloso (evita detección)
  stealth_mode: false
  
  # SSH Brute Force
  ssh_enabled: true
  
  # Redes permitidas (OBLIGATORIO para activar)
  allowed_networks:
    - "192.168.0.0/16"
    - "10.0.0.0/8"
    - "127.0.0.0/8"
